const counters = { clears: null, 'true-clears': null };  // 通常クリア / 裏ボス討伐
function syncCounter(key, hit) {
  if (globalThis.__TEST_HOOK) return;  // テスト・スナップショット時は通信しない
  try {
    fetch(`https://abacus.jasoncameron.dev/${hit ? 'hit' : 'get'}/hajimari-no-ken/${key}`)
      .then(r => r.json())
      .then(d => { if (d && typeof d.value === 'number') counters[key] = d.value; })
      .catch(() => {});
  } catch (e) {}
}
syncCounter('clears', false);
syncCounter('true-clears', false);

const keys = {};
const justPressed = new Set();
const DIR_KEYS = {
  up:['ArrowUp','KeyW'], down:['ArrowDown','KeyS'],
  left:['ArrowLeft','KeyA'], right:['ArrowRight','KeyD'],
};
const CONFIRM = ['KeyZ','Enter','Space'];
const CANCEL  = ['KeyX','Escape'];

addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  initAudio();
  if (!e.repeat) justPressed.add(e.code);
  keys[e.code] = true;
  if (e.code === 'KeyM' && !e.repeat) toggleBgm();
});
addEventListener('keyup', e => { keys[e.code] = false; });

const heldDir = () => {
  for (const d of ['up','down','left','right'])
    if (DIR_KEYS[d].some(k => keys[k])) return d;

let audio = null, bgmOn = true, bgmTimer = null, curTrack = null;
function initAudio() {
  if (audio) return;
  audio = new (window.AudioContext || window.webkitAudioContext)();
  if (curTrack) playTrack(curTrack);
}
let bgmNodes = [];
function tone(freq, at, dur, type = 'square', vol = 0.05) {
  if (!audio || freq <= 0) return;
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, at);
  g.gain.exponentialRampToValueAtTime(0.001, at + dur);
  o.connect(g).connect(audio.destination);
  o.start(at); o.stop(at + dur);
}
function stopBgmNodes() {  // 予約ずみのBGM音を ぜんぶ止める(重複さいせい防止)
  for (const o of bgmNodes) {
    o.onended = null;
    try { o.stop(); } catch (e) {}
  }
  bgmNodes = [];
}
function reg(n) {
  bgmNodes.push(n);
  n.onended = () => { const i = bgmNodes.indexOf(n); if (i >= 0) bgmNodes.splice(i, 1); };
}
/* ---- BGM音色(今風: パッド・エコー・ドラム入り) ---- */
let bgmDry = null, bgmEcho = null, noiseBuf = null;
function initBgmBus() {
  if (bgmDry || !audio) return;
  bgmDry = audio.createGain();
  bgmDry.gain.value = 1;
  bgmDry.connect(audio.destination);
  const delay = audio.createDelay();
  delay.delayTime.value = 0.27;
  const fb = audio.createGain(); fb.gain.value = 0.3;
  const wet = audio.createGain(); wet.gain.value = 0.22;
  bgmEcho = audio.createGain();
  bgmEcho.gain.value = 1;
  bgmEcho.connect(audio.destination);
  bgmEcho.connect(delay);
  delay.connect(fb); fb.connect(delay);
  delay.connect(wet); wet.connect(audio.destination);
}
function vLead(freq, at, dur) {  // デチューンした2本のリード
  const g = audio.createGain();
  g.gain.setValueAtTime(0.0001, at);
  g.gain.linearRampToValueAtTime(0.045, at + 0.02);
  g.gain.setValueAtTime(0.045, at + Math.max(0.03, dur * 0.6));
  g.gain.exponentialRampToValueAtTime(0.001, at + dur);
  g.connect(bgmEcho);
  for (const det of [-5, 5]) {
    const o = audio.createOscillator();
    o.type = 'triangle';
    o.frequency.value = freq;
    o.detune.value = det;
    o.connect(g);
    o.start(at); o.stop(at + dur + 0.02);
    reg(o);
  }
}
function vPad(freq, at, dur) {  // やわらかいコードパッド
  const o = audio.createOscillator(), g = audio.createGain(), f = audio.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.value = freq;
  o.detune.value = Math.random() * 6 - 3;
  f.type = 'lowpass'; f.frequency.value = 1000; f.Q.value = 0.4;
  g.gain.setValueAtTime(0.0001, at);
  g.gain.linearRampToValueAtTime(0.016, at + 0.1);
  g.gain.setValueAtTime(0.016, at + Math.max(0.12, dur - 0.2));
  g.gain.linearRampToValueAtTime(0.0001, at + dur);
  o.connect(f); f.connect(g); g.connect(bgmDry);
  o.start(at); o.stop(at + dur + 0.05);
  reg(o);
}
function vBass(freq, at, dur) {
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.085, at);
  g.gain.exponentialRampToValueAtTime(0.001, at + dur);
  o.connect(g); g.connect(bgmDry);
  o.start(at); o.stop(at + dur);
  reg(o);
}
function getNoise() {
  if (noiseBuf) return noiseBuf;
  noiseBuf = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.3), audio.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return noiseBuf;
}
function vKick(at) {
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(130, at);
  o.frequency.exponentialRampToValueAtTime(45, at + 0.09);
  g.gain.setValueAtTime(0.13, at);
  g.gain.exponentialRampToValueAtTime(0.001, at + 0.12);
  o.connect(g); g.connect(bgmDry);
  o.start(at); o.stop(at + 0.13);
  reg(o);
}
function vSnare(at) {
  const s = audio.createBufferSource(); s.buffer = getNoise();
  const f = audio.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1800; f.Q.value = 0.7;
  const g = audio.createGain();
  g.gain.setValueAtTime(0.05, at);
  g.gain.exponentialRampToValueAtTime(0.001, at + 0.12);
  s.connect(f); f.connect(g); g.connect(bgmDry);
  s.start(at); s.stop(at + 0.14);
  reg(s);
}
function vHat(at) {
  const s = audio.createBufferSource(); s.buffer = getNoise();
  const f = audio.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7500;
  const g = audio.createGain();
  g.gain.setValueAtTime(0.025, at);
  g.gain.exponentialRampToValueAtTime(0.001, at + 0.045);
  s.connect(f); f.connect(g); g.connect(bgmDry);
  s.start(at); s.stop(at + 0.06);
  reg(s);
}
function sfx(freq, dur = 0.08, type = 'square', vol = 0.08) {
  if (!audio) return;
  tone(freq, audio.currentTime, dur, type, vol);
}
function sweep(f1, f2, dur, type = 'sawtooth', vol = 0.09) {
  if (!audio) return;
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f1, audio.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, f2), audio.currentTime + dur);
  g.gain.setValueAtTime(vol, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
  o.connect(g).connect(audio.destination);
  o.start(); o.stop(audio.currentTime + dur);
}

function nf(n) {
  const m = /^([A-G])(#?)(\d)$/.exec(n);
  const semi = {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[m[1]] + (m[2] ? 1 : 0);
  return 440 * Math.pow(2, (semi - 9) / 12 + (+m[3] - 4));
}

function playTrack(name) {
  curTrack = name;
  clearTimeout(bgmTimer); bgmTimer = null;
  stopBgmNodes();
  if (!audio || !bgmOn) return;
  initBgmBus();
  const tr = TRACKS[name];
  const spb = 60 / tr.bpm;                       // 1拍の秒数
  const total = tr.chords.length * 4 * spb;      // ループ全体
  const t0 = audio.currentTime + 0.05;
  const end = t0 + total;
  // メロディ
  let t = t0;
  for (const [n, b] of tr.mel) {
    if (t >= end - 0.01) break;
    const d = Math.min(b * spb, end - t);
    if (n) vLead(nf(n), t, d * 0.95);
    t += b * spb;
  }
  // コードパッドと ベース(ルート音)
  tr.chords.forEach((ch, i) => {
    const ct = t0 + i * 4 * spb;
    for (const n of ch) vPad(nf(n), ct, 4 * spb);
    const root = nf(ch[0]) / 2;
    vBass(root, ct, 1.4 * spb);
    vBass(root, ct + 1.5 * spb, 0.45 * spb);
    vBass(root, ct + 2 * spb, 0.9 * spb);
    vBass(root * (i % 2 ? 1.5 : 1), ct + 3 * spb, 0.9 * spb);
  });
  // ドラム(8分きざみのパターン)
  if (tr.drums) {
    const step = spb / 2;
    for (let i = 0; t0 + i * step < end - 0.001; i++) {
      const c = tr.drums[i % tr.drums.length];
      const at = t0 + i * step;
      if (c === 'k') vKick(at);
      else if (c === 's') vSnare(at);
      else if (c === 'h') vHat(at);
    }
  }
  bgmTimer = setTimeout(() => playTrack(name), total * 1000 - 30);
}
function setTrack(name) { if (curTrack !== name) playTrack(name); }
function toggleBgm() {
  bgmOn = !bgmOn;
  if (bgmOn) playTrack(curTrack || 'title');
  else { clearTimeout(bgmTimer); bgmTimer = null; stopBgmNodes(); }
}

function drawArt(art, x, y, s, pal) {
  const colors = pal || art.pal;
  for (let r = 0; r < art.rows.length; r++) {
    const row = art.rows[r];
    for (let c = 0; c < row.length; c++) {
      const col = colors[row[c]];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(x + c * s, y + r * s, s, s);
    }
  }
}

        r(x0, 2 + i, w, 1, c);

function genWorld() {
  const W = 40, H = 30, rows = [];
  const fc = [[8,5],[31,5],[7,21],[33,22],[14,25],[27,15]];
  const mc = [[9,11],[33,10],[25,26],[5,15]];
  for (let y = 0; y < H; y++) {
    let s = '';
    for (let x = 0; x < W; x++) {
      let ch = 'G';
      const ed = Math.min(x, W - 1 - x, y * 1.4, (H - 1 - y) * 1.4);
      if (ed < 1.6 + rnd(x, y, 7) * 2.2) ch = 'W';
      else {
        for (const [cx, cy] of mc)
          if (Math.hypot(x - cx, y - cy) < 2.2 + rnd(x, y, 11) * 1.6) ch = 'M';
        if (ch === 'G')
          for (const [cx, cy] of fc)
            if (Math.hypot(x - cx, y - cy) < 3.0 + rnd(x, y, 13) * 2.0) ch = 'F';
      }
      if (Math.abs(x - 20) <= 2 && Math.abs(y - 8) <= 2) ch = 'G';
      if (Math.abs(x - 20) <= 1 && Math.abs(y - 23) <= 1) ch = 'G';
      if (Math.abs(x - 7) <= 1 && Math.abs(y - 4) <= 1) ch = 'G';
      if (Math.abs(x - 13) <= 1 && Math.abs(y - 23) <= 1) ch = 'G';
      if (x === 5 && y >= 14 && y <= 19) ch = 'G';  // 霊峰へつづく 渓谷の道
      s += ch;
    }
    rows.push(s);
  }
  rows[8] = rows[8].slice(0, 20) + 'A' + rows[8].slice(21);
  rows[23] = rows[23].slice(0, 20) + 'c' + rows[23].slice(21);
  rows[4] = rows[4].slice(0, 7) + 'n' + rows[4].slice(8);
  rows[23] = rows[23].slice(0, 13) + 'v' + rows[23].slice(14);
  rows[14] = rows[14].slice(0, 5) + 'y' + rows[14].slice(6);
  return rows;
}

  for (const n of map.npcs) if (!npcGone(n) && n.tx === x && n.ty === y) return n;

}
function isFree(x, y, forNpc) {
  if (SOLID.has(tileAt(mapId, x, y))) return false;

    if (map.warps && map.warps[x + ',' + y]) return false;
    if (player.tx === x && player.ty === y) return false;
  }
  return true;
}

/* ---- メッセージ・選択肢 ---- */
function msg(pages, onEnd) {
  dialog = { pages, pi:0, ci:0, onEnd: onEnd || null };
}
function msgC(pages, opts, cb) {
  dialog = { pages, pi:0, ci:0, onEnd:null, choiceOpts:opts, choiceCb:cb };
}
function updateDialog() {
  const page = dialog.pages[dialog.pi];
  dialog.ci = Math.min(page.length, dialog.ci + 2);
  if (pressed(CONFIRM) || pressed(CANCEL)) {
    if (dialog.ci < page.length) { dialog.ci = page.length; return; }
    if (dialog.pi < dialog.pages.length - 1) { dialog.pi++; dialog.ci = 0; seConfirm(); return; }
    if (dialog.choiceOpts) {
      if (!choice) { choice = { opts:dialog.choiceOpts, sel:0, cb:dialog.choiceCb }; seConfirm(); }
      return;
    }
    const f = dialog.onEnd;
    dialog = null;
    seConfirm();
    if (f) f();
  }
}
function updateChoice() {
  if (pUp())   { choice.sel = (choice.sel + choice.opts.length - 1) % choice.opts.length; seCursor(); }
  if (pDown()) { choice.sel = (choice.sel + 1) % choice.opts.length; seCursor(); }
  if (pressed(CONFIRM)) {
    const c = choice; choice = null; dialog = null; seConfirm();
    c.cb(c.sel);
  } else if (pressed(CANCEL)) {
    const c = choice; choice = null; dialog = null; seCancel();
    c.cb(c.opts.length - 1);
  }
}
function startFade(onMid, onDone) {
  fade = { phase:'out', t:0, onMid, onDone };
}
function teleport(m, x, y, dir) {
  mapId = m; map = MAPS[m];
  player.tx = x; player.ty = y;
  player.px = x * T; player.py = y * T;
  if (dir) player.dir = dir;
  for (const c of party) {
    c.tx = x; c.ty = y; c.px = x * T; c.py = y * T;
    if (dir) c.dir = dir;
  }
  setTrack(map.track);
}

/* ---- セーブ ---- */
function save() {
  try {
    localStorage.setItem('hajimari_save', JSON.stringify({
      lv:hero.lv, exp:hero.exp, gold:hero.gold, hp:hero.hp, mp:hero.mp,
      weapon:hero.weapon, armor:hero.armor, shield:hero.shield, inv:hero.inv,
      cleared:hero.cleared, blessed:hero.blessed, trueCleared:hero.trueCleared, lap:hero.lap,
      dragonEvolved:hero.dragonEvolved,
      party: party.map(m => ({ job:m.job, hp:m.hp, mp:m.mp })),
      pos: { map:mapId, x:player.tx, y:player.ty },
    }));
  } catch (e) {}
}
function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem('hajimari_save'));
    if (!d) return false;
    const pd = d.party || [];
    const pos = d.pos;
    delete d.party; delete d.pos;
    Object.assign(hero, d);
    hero.cleared = !!d.cleared;
    hero.blessed = !!d.blessed;
    hero.trueCleared = !!d.trueCleared;
    hero.lap = d.lap || 1;
    hero.dragonEvolved = !!d.dragonEvolved;
    // 旧バージョンのかな表記アイテムを漢字名へ移行
    const RENAMES = {
      'ひのきのぼう':'ひのきの棒', 'こんぼう':'こん棒', 'どうのつるぎ':'銅の剣',
      'しんのつるぎ':'神の剣', 'たびのふく':'旅の服', 'かわのたて':'皮の盾',
      'やくそう':'薬草', 'どくけしそう':'毒消し草', 'せいすい':'聖水',
      'キメラのつばさ':'キメラの翼',
    };
    hero.weapon = RENAMES[hero.weapon] || hero.weapon;
    hero.armor = RENAMES[hero.armor] || hero.armor;
    hero.shield = RENAMES[hero.shield] || hero.shield;
    const inv2 = {};
    for (const k of Object.keys(hero.inv || {})) inv2[RENAMES[k] || k] = hero.inv[k];
    hero.inv = inv2;
    party.length = 0;
    for (const s of pd) {
      if (!JOBS[s.job]) continue;
      const m = makeCompanion(s.job);
      m.hp = Math.min(s.hp, maxHpOf(m));
      m.mp = Math.min(s.mp, maxMpOf(m));
      party.push(m);
    }
    return (pos && MAPS[pos.map]) ? pos : true;
  } catch (e) { return false; }
}
function hasSave() {
  try { return !!localStorage.getItem('hajimari_save'); } catch (e) { return false; }
}
function newGame() {
  hero.lv = 1; hero.exp = 0; hero.gold = 120;
  hero.hp = 16; hero.mp = 0;
  hero.weapon = 'ひのきの棒';
  hero.armor = hero.shield = null;

function continueGame() {
  const r = loadSave();
  if (r && r.map) teleport(r.map, r.x, r.y, 'down');
  else teleport('town', 10, 5, 'down');
  state = 'field';
  msg(["冒険の書から 再開した！"]);
}
/* ================= フィールド ================= */
let lastBump = -99;
function updateField() {
  const moving = player.px !== player.tx * T || player.py !== player.ty * T;
  if (moving) {
    stepToward(player);
    if (player.px === player.tx * T && player.py === player.ty * T) onArrive();
    return;
  }
  if (pressed(CONFIRM)) { interact(); return; }
  if (pressed(CANCEL)) { seConfirm(); state = 'menu'; menu = { sel:0, who:0 }; return; }

  const d = heldDir();
  if (!d) { player.animT = 0; return; }
  player.dir = d;
  const [dx, dy] = DXY[d];
  const nx = player.tx + dx, ny = player.ty + dy;
  if (isFree(nx, ny, false)) {
    moveParty(player.tx, player.ty);
    player.tx = nx; player.ty = ny;
  } else if (tick - lastBump > 16) {
    seBump(); lastBump = tick;
  }
}
function moveParty(px0, py0) {  // 隊列: 仲間が ひとつ前の位置へ ついてくる
  let tx = px0, ty = py0;
  for (const c of party) {
    const ox = c.tx, oy = c.ty;
    if (ox === tx && oy === ty) break;
    c.dir = tx > ox ? 'right' : tx < ox ? 'left' : ty > oy ? 'down' : 'up';
    c.tx = tx; c.ty = ty;
    tx = ox; ty = oy;
  }
}
function onArrive() {
  let w = map.warps && map.warps[player.tx + ',' + player.ty];
  if (w) {
    if (w.map === 'castle' && hero.cleared) w = { ...w, map:'ramen' };  // 魔王討伐後はラーメン屋に改築済み
    const w2 = w;
    seWarp();
    startFade(() => teleport(w2.map, w2.x, w2.y, w2.dir));
    return;
  }
  if (tileAt(mapId, player.tx, player.ty) === 's') {
    if (hero.trueCleared) {  // 真の英雄には 強くてニューゲームを 促す
      msgC(["魔法陣が ひときわ 強く 輝いている…\n真の英雄よ、どうする？"],
           ["記録する", "強くてニューゲーム", "やめておく"], i => {
        if (i === 0) {
          save();
          seSave();
          msg(["冒険の書に 記録した！\n次は ここから 再開できる。"]);
        } else if (i === 1) {
          msgC(["能力・装備・仲間を 引き継いで\n物語を 最初から 始めますか？"], ["始める", "やめておく"], j => {
            if (j === 0) ngPlus();
          });
        }
      });
      return;
    }
    msgC(["魔法陣が 温かく 光っている…\n冒険の書に 記録しますか？"], ["記録する","やめておく"], i => {
      if (i !== 0) return;
      save();
      seSave();
      msg(["冒険の書に 記録した！\n次は ここから 再開できる。"]);
    });
    return;
  }
  if (mapId === 'world') checkEncounter();
}
function ngPlus() {  // 強くてニューゲーム: 能力を 引き継いで 物語をリセット
  hero.cleared = false;
  hero.trueCleared = false;
  hero.lap = (hero.lap || 1) + 1;
  seLevelUp();
  startFade(() => {
    teleport('town', 9, 11, 'up');
    save();
  }, () => {
    msg(["時が 巻き戻り 世界に 再び 闇が 満ちる…",
         `${hero.lap}周目の 冒険が 始まった！\n（能力・装備・仲間は 引き継ぎ）`,
         "もう一度 魔王を 倒し\n世界を 救おう！"]);
  });
}
function stepToward(e) {
  const gx = e.tx * T, gy = e.ty * T;
  e.px += Math.sign(gx - e.px) * Math.min(SPEED, Math.abs(gx - e.px));
  e.py += Math.sign(gy - e.py) * Math.min(SPEED, Math.abs(gy - e.py));
  e.animT++;
}
function interact() {
  const [dx, dy] = DXY[player.dir];
  const fx = player.tx + dx, fy = player.ty + dy;
  let npc = entityAt(fx, fy);
  if (!npc && tileAt(mapId, fx, fy) === 'C') npc = entityAt(fx + dx, fy + dy);
  if (!npc) return;
  seConfirm();
  npc.dir = facingBack(player.dir);
  if (npc.goods) {
    state = 'shop';
    shop = { npc, sel:0 };
    msg([npc.greet]);
  } else if (npc.service === 'inn') {
    innTalk();
  } else if (npc.service === 'ramen') {
    ramenTalk();
  } else if (npc.recruit) {
    recruitTalk(npc);
  } else if (npc.boss) {
    msg(["よくぞ ここまで 来たな 小さき者…",
         "この世の闇は すべて 我が物。\nお前たちの 旅は ここで 終わりだ！"],
        () => startBattle(npc.boss, 'castle'));
  } else if (npc.trueBoss) {
    msg(["……システム、起動。",
         "我は ゾウユウ。\nかつて 人間の システムエンジニア…\n今は 神の頭脳を 得た 存在。",
         "魔王など 我が作った テストケースに すぎん。",
         "この世界は 我が 設計し直す。\nお前たち 英雄は…… 不要な バグだ。\n消去 を 実行する！"],
        () => startBattle(npc.trueBoss, 'cyber'));
  } else if (npc.god) {
    godTalk();
  } else if (npc.elder) {
    elderTalk();
  } else if (npc.tame) {
    msg(["グルルルル…！",
         "我が ねぐらに 足を 踏み入れる者よ…\nその力 見せてみよ！"],
        () => startBattle('ドラゴン', 'castle'));
  } else {
    msg(npc.lines.slice());
  }
}
function godTalk() {
  if (hero.blessed) {
    msg(["汝らに 授けし力は\n世界を 照らす 光と ならん…"]);
    return;
  }
  if (party.length < 2) {
    msg(["我は 古き神なり…",
         "３つの 勇ましき魂が\n揃いし時 再び まみえよう。"]);
    return;
  }
  msg(["我は 古き神なり…\nよくぞ ３人で ここまで 来た。",
       "汝らに 真の力を 授けよう！"], () => {
    hero.blessed = true;
    if (hero.weapon) addInv(hero.weapon);
    hero.weapon = '神の剣';
    seLevelUp();
    startFade(null, () => {
      msg(["天から 光が 降り注ぐ…！",
           `${hero.name}は 神の剣を 授かった！\n${JOBS.warrior.name}は 雷神の斧！\n${JOBS.mage.name}は 賢者の杖！`,
           "３人は 新たな姿に 目覚めた！"]);
    });
  });
}

         "その子を ここへ 連れて 参られよ。\n古の力を 授けようぞ。"]);

  msg(["おお…！ なつかしき 我が一族の 子よ。",

       "竜の子よ！ 古の血に 目覚め\n蒼き 伝説の姿と なるがよい！"], () => {

}
function ramenTalk() {  // 改心した魔王の ラーメン屋
  msgC(["いらっしゃい！ 「魔王ラーメン」へ ようこそ！",
        "俺は 本当は ラーメン屋に なりたかったんだ！\nゾウユウの 洗脳から 目覚めさせてくれて\n本当に ありがとう！",
        "闇の力より 熱々の一杯。\nこれが 俺の 第二の人生だ！",

function initEnt(n) {
  if (n.px !== undefined) return;
  n.px = n.tx * T; n.py = n.ty * T; n.animT = 0;
  n.home = [n.tx, n.ty]; n.wait = 60;
}
function updateNpcs() {
  for (const c of party) {
    if (c.px !== c.tx * T || c.py !== c.ty * T) stepToward(c);
  }
  for (const n of map.npcs) {
    if (npcGone(n)) continue;
    initEnt(n);
    const moving = n.px !== n.tx * T || n.py !== n.ty * T;
    if (moving) { stepToward(n); continue; }
    if (!n.wander || state !== 'field' || dialog) continue;
    if (--n.wait > 0) continue;
    n.wait = 60 + Math.floor(Math.random() * 150);
    const d = ['up','down','left','right'][Math.floor(Math.random() * 4)];
    n.dir = d;
    if (Math.random() < 0.4) continue;
    const [dx, dy] = DXY[d];
    const nx = n.tx + dx, ny = n.ty + dy;
    if (Math.abs(nx - n.home[0]) > 2 || Math.abs(ny - n.home[1]) > 2) continue;
    if (isFree(nx, ny, true)) { n.tx = nx; n.ty = ny; }
  }
}

let noEncUntil = 0;  // 戦闘直後の猶予(最低3秒 ≒ 180フレーム)
function checkEncounter() {
  if (tick < noEncUntil) return;
  const ch = tileAt('world', player.tx, player.ty);
  const d = Math.abs(player.tx - 20) + Math.abs(player.ty - 8);
  if (d < 3) return;
  const rate = ch === 'F' ? 1 / 7 : 1 / 14;
  if (Math.random() >= rate) return;
  const forest = ch === 'F';
  if (Math.random() < 0.05) { startBattle('銀のピクシー', forest ? 'forest' : 'grass'); return; }
  let pool;
  if (d <= 7)       pool = forest ? ['キャットガール','アルラウネ','ハーピー','ピンクピクシー']
                                  : ['ピクシー','ピクシー','ピンクピクシー','キャットガール','アルラウネ'];
  else if (d <= 14) pool = forest ? ['バンシー','ウィッチ','アルラウネ','ハーピー']
                                  : ['ハーピー','ピンクピクシー','バンシー','キャットガール'];
  else              pool = forest ? ['ウィッチ','サキュバス','バンシー'] : ['バンシー','ウィッチ','サキュバス'];
  startBattle(pool[Math.floor(Math.random() * pool.length)], forest ? 'forest' : 'grass');
}

const BCMDS = ['戦う','呪文','道具','逃げる'];
const aliveFoes = () => battle.foes.filter(f => f.hp > 0);
const FOE_OFFS = { 1:[0], 2:[-110, 110], 3:[-155, 0, 155] };
const foeOffset = f => FOE_OFFS[battle.foes.length][battle.foes.indexOf(f)] || 0;
const pickFoe = () => { const a = aliveFoes(); return a[Math.floor(Math.random() * a.length)]; };

function updateBattle() {

      battle.mode = 'wait';

                                  : `${lead}が 現れた！`], () => {

        } else battle.mode = 'cmd';

        else { battle.mode = 'spell'; battle.ssel = 0; }

        if (its.length === 0) { battle.mode = 'wait'; msg(["使える 道具を 持っていない！"], () => battle.mode = 'cmd'); }

  if (battle.mode === 'spell') {

    if (pDown()) { battle.ssel = (battle.ssel + 1) % sp.length; seCursor(); }

    if (pressed(CONFIRM)) useBattleItem(its[battle.isel]);

    if (pDown()) { battle.tsel = (battle.tsel + 1) % a.length; seCursor(); }

}
const battleItems = () => Object.keys(hero.inv).filter(n => ITEMS[n] && ITEMS[n].use === 'heal');

function enemyActAt(k) {  // 敵が 1体ずつ 順に 行動する
  if (k === 0) battle.mode = 'wait';

  if (en.breath && Math.random() < 0.35) act = 'fire';
  // ---- ボスは パーティ全体への 大技を 使う ----
  const aoeHit = (lo, hi) => {  // 全員にダメージ、ページと戦闘不能者を返す
    const lines = [], downs = [];
    for (const a of targets) {

function levelChain(done) {
  if (hero.lv < MAXLV && hero.exp >= LVT[hero.lv + 1].exp) {
    const o = LVT[hero.lv], n = LVT[hero.lv + 1];
    hero.lv++;
    hero.hp += n.hp - o.hp;
    hero.mp += n.mp - o.mp;
    for (const m of party) {
      const jo = JOBS[m.job].lvt[hero.lv - 1], jn = JOBS[m.job].lvt[hero.lv];
      if (m.hp > 0) m.hp += jn.hp - jo.hp;
      m.mp += jn.mp - jo.mp;
    }
    seLevelUp();
    const pages = [`${hero.name}は レベル${hero.lv}に 上がった！`,
      `力 +${n.str - o.str}　素早さ +${n.agi - o.agi}\n最大ＨＰ +${n.hp - o.hp}　最大ＭＰ +${n.mp - o.mp}`];
    if (party.length) pages.push('仲間たちも 力を つけた！');
    for (const s of Object.keys(SPELLS))
      if (SPELLS[s].lv === hero.lv) pages.push(`呪文「${s}」を 覚えた！`);
    msg(pages, () => levelChain(done));
  } else done();
}
function endBattle() {

function died() {

    state = 'field';

    startFade(() => { teleport('town', 10, 7, 'down'); },
      () => msg(["「死んでしまうとは 情けない！\n　だが チャンスを やろう」\nどこからか 声が 聞こえた…"]));
  });
}
/* ================= 更新 ================= */
function update() {
  tick++;
  if (fade) {
    fade.t++;
    if (fade.phase === 'out' && fade.t >= 10) {
      if (fade.onMid) fade.onMid();
      fade.phase = 'in'; fade.t = 0;
    } else if (fade.phase === 'in' && fade.t >= 10) {
      const f = fade.onDone;
      fade = null;
      if (f) f();
    }
    justPressed.clear();
    return;
  }
  if (battle) {  // 戦闘エフェクトはメッセージ中でも進める(残りっぱなし防止)
    if (battle.shake > 0) battle.shake--;
    for (const f of battle.foes) { if (f.flash > 0) f.flash--; }
    if (battle.fx > 0) battle.fx--;
    if (battle.slash > 0) battle.slash--;
    if (battle.bolt > 0) battle.bolt--;
    if (battle.flame > 0) battle.flame--;
  }
  if (choice) updateChoice();
  else if (dialog) updateDialog();
  else if (state === 'title') updateTitle();
  else if (state === 'field') updateField();
  else if (state === 'shop') updateShop();
  else if (state === 'menu') updateMenu();
  else if (state === 'battle') updateBattle();
  if (state === 'field' || state === 'shop' || state === 'menu') updateNpcs();
  justPressed.clear();
}
function updateTitle() {
  const opts = hasSave() ? ['初めから','続きから'] : ['初めから'];
  if (pUp() || pDown()) { titleSel = (titleSel + 1) % opts.length; seCursor(); }
  titleSel = clamp(titleSel, 0, opts.length - 1);
  if (pressed(CONFIRM)) {
    seConfirm();
    startFade(() => { if (opts[titleSel] === '続きから') continueGame(); else newGame(); });
  }
}

          }
        };
        ctx.strokeStyle = 'rgba(140,220,255,0.7)'; ctx.lineWidth = 11; boltPath(); ctx.stroke();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; boltPath(); ctx.stroke();
      }
      const rr = t * 8;  // 着弾の衝撃リング
      ctx.strokeStyle = `rgba(255,240,140,${Math.max(0, 1 - t / 16)})`;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.ellipse(cx, cy + 55, rr, rr * 0.32, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = `rgba(180,240,255,${Math.max(0, 0.9 - t / 14)})`;  // 散る火花
      for (let i = 0; i < 7; i++) {
        const ang = i * 0.9 + t * 0.1;
        ctx.fillRect(cx + Math.cos(ang) * rr * 0.9 - 3, cy + 30 + Math.sin(ang) * rr * 0.3 - 3, 5, 5);
      }
    });
  }
  if (battle.flame > 0) {  // 業火の波(全体攻撃)
    const fp = 1 - battle.flame / 22;
    if (battle.flame > 16 && tick % 2) {
      ctx.fillStyle = 'rgba(255,110,30,0.5)';
      ctx.fillRect(SX, SY, SW, SH);
    }
    const fa = Math.max(0, 1 - fp * 1.1);
    for (let i = 0; i < 12; i++) {
      const fx2 = SX + 22 + i * 38 + (i % 2) * 9;
      const h = (60 + rnd(i, Math.floor(tick / 2), 99) * 90) * (1 - fp * 0.55);
      const base = SY + 300;
      ctx.fillStyle = `rgba(232,64,32,${fa * 0.8})`;
      ctx.fillRect(fx2 - 9, base - h * 0.62, 18, h * 0.62);
      ctx.fillStyle = `rgba(255,136,48,${fa * 0.85})`;
      ctx.fillRect(fx2 - 6, base - h * 0.85, 12, h * 0.6);
      ctx.fillStyle = `rgba(255,216,96,${fa})`;
      ctx.fillRect(fx2 - 2, base - h, 5, h * 0.45);
    }
    ctx.fillStyle = `rgba(255,240,150,${fa})`;  // 舞う火の粉
    for (let i = 0; i < 10; i++) {
      const px2 = SX + rnd(i, 5, 31) * SW;
      const py2 = SY + 290 - ((tick * (2 + rnd(i, 9, 33) * 3) + i * 47) % 240);
      ctx.fillRect(px2, py2, 4, 4);
    }
  }
  ctx.restore();

  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.roundRect(SX, SY, SW, SH, 8); ctx.stroke();

  const allies2 = allAllies();
  const compact = allies2.length > 3;  // ４人時は 窓を 詰める
  allies2.forEach((a, i) => {
    const wh = compact ? 92 : 124, sp2 = compact ? 98 : 132;
    const wy = 28 + i * sp2;
    drawWindow(28, wy, 204, wh);
    const dead = a.hp <= 0;
    const fs = compact ? 16 : 18;
    text(a.name, 52, wy + (compact ? 12 : 16), compact ? 17 : 20, dead ? '#888' : '#ffd860');
    text('ＨＰ', 52, wy + (compact ? 38 : 52), fs);
    text(a.hp + '/' + maxHpOf(a), 204, wy + (compact ? 38 : 52), fs,
         dead || a.hp <= maxHpOf(a) / 4 ? '#ff8060' : '#fff', 'right');
    text('ＭＰ', 52, wy + (compact ? 62 : 86), fs);
    text(a.mp + '/' + maxMpOf(a), 204, wy + (compact ? 62 : 86), fs, '#fff', 'right');
  });

  if (battle.mode === 'cmd' || battle.mode === 'spell' || battle.mode === 'item' || battle.mode === 'target') {
    drawWindow(28, 420, 230, 4 * 44 + 40);
    BCMDS.forEach((c, i) => {
      const me = battle.mode === 'cmd' && i === battle.sel;
      if (me) text('▶', 50, 446 + i * 44, 22, '#ffd860');
      text(c, 84, 446 + i * 44, 22, me ? '#ffd860' : '#fff');
    });
    if (battle.mode === 'target') {  // ねらう敵を えらぶ
      const a = aliveFoes();
      drawWindow(270, 420, 320, a.length * 44 + 40);
      a.forEach((f, i) => {
        const me = i === battle.tsel;
        if (me) text('▶', 292, 446 + i * 44, 22, '#ffd860');
        text(f.name, 326, 446 + i * 44, 22, me ? '#ffd860' : '#fff');
      });
    }
    if (battle.mode === 'spell') {
      const sp = learnedSpells();
      drawWindow(270, 420, 320, sp.length * 44 + 40);
      sp.forEach((s, i) => {
        const me = i === battle.ssel;
        if (me) text('▶', 292, 446 + i * 44, 22, '#ffd860');
        text(`${s}　MP${SPELLS[s].mp}`, 326, 446 + i * 44, 22, me ? '#ffd860' : '#fff');
      });
    }
    if (battle.mode === 'item') {
      const its = battleItems();
      drawWindow(270, 420, 320, its.length * 44 + 40);
      its.forEach((n, i) => {
        const me = i === battle.isel;
        if (me) text('▶', 292, 446 + i * 44, 22, '#ffd860');
        text(`${n}　×${hero.inv[n]}`, 326, 446 + i * 44, 22, me ? '#ffd860' : '#fff');
      });
    }
  }
  if (battle.fx > 0 && tick % 4 < 2) {
    ctx.fillStyle = 'rgba(255,230,120,0.35)';
    ctx.fillRect(SX, SY, SW, SH);
  }
  if (battle.mode === 'intro') {
    ctx.fillStyle = battle.intro % 8 < 4 ? '#fff' : '#000';
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
}
function drawTitle() {
  ctx.fillStyle = '#04040c';
  ctx.fillRect(0, 0, cv.width, cv.height);
  for (let i = 0; i < 40; i++) {
    const x = rnd(i, 7, 1) * cv.width, y = rnd(i, 13, 2) * 360;
    ctx.fillStyle = (Math.floor(tick / 30) + i) % 5 ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)';
    ctx.fillRect(x, y, 2, 2);
  }
  drawArt(ART.sword, cv.width / 2 - 64, 96, 8);
  text('はじまりの剣', cv.width / 2 + 4, 264, 64, '#222', 'center');
  text('はじまりの剣', cv.width / 2, 260, 64, '#ffd860', 'center');
  text('〜 アルファの町と 広がる世界 〜', cv.width / 2, 348, 22, '#aac', 'center');
  const opts = hasSave() ? ['初めから','続きから'] : ['初めから'];
  const w = 300, h = opts.length * 50 + 40;
  drawWindow(cv.width / 2 - w / 2, 430, w, h);
  opts.forEach((o, i) => {
    const me = i === titleSel;
    if (me && Math.floor(tick / 16) % 2 === 0) text('▶', cv.width / 2 - w / 2 + 36, 456 + i * 50, 24, '#ffd860');
    text(o, cv.width / 2 - w / 2 + 80, 456 + i * 50, 26, me ? '#ffd860' : '#fff');
  });
}
function draw() {
  if (state === 'title') { drawTitle(); }
  else if (state === 'battle') { drawBattle(); if (dialog) drawDialog(); }
  else {
    ctx.fillStyle = '#04040c';
    ctx.fillRect(0, 0, cv.width, cv.height);
    const cam = getCam();
    const g = map.grid, cols = g[0].length, rows = g.length;
    const x0 = Math.max(0, Math.floor(cam.x / T)), x1 = Math.min(cols - 1, Math.floor((cam.x + cv.width) / T));
    const y0 = Math.max(0, Math.floor(cam.y / T)), y1 = Math.min(rows - 1, Math.floor((cam.y + cv.height) / T));
    for (let y = y0; y <= y1; y++)
      for (let x = x0; x <= x1; x++)
        drawTile(g[y][x], x * T - cam.x, y * T - cam.y, x, y);
    const ents = [...map.npcs.filter(n => !npcGone(n)), ...party, player];
    for (const e of ents) initEnt(e);
    ents.sort((a, b) => a.py - b.py);
    for (const e of ents) drawChara(e, cam);
    if (hero.cleared && mapId === 'town') {  // 凱旋パレードの紙吹雪
      const COL = ['#f06060', '#f0c040', '#48b058', '#40a0d0', '#d068d0', '#ffffff'];
      for (let i = 0; i < 44; i++) {
        const sp = 1.2 + rnd(i, 3, 9) * 1.8;
        const yy = ((tick * sp + rnd(i, 5, 11) * 760) % 780) - 30;
        const xx = rnd(i, 7, 13) * cv.width + Math.sin(tick / 24 + i * 1.7) * 22;
        ctx.fillStyle = COL[i % COL.length];
        ctx.fillRect(xx, yy, 5, i % 3 ? 5 : 8);
      }
    }
    if (state === 'shop') drawShop();
    if (state === 'menu') drawMenu();
    if (dialog) drawDialog();
  }
  if (choice) drawChoice();
  if (fade) {
    const a = fade.phase === 'out' ? fade.t / 10 : 1 - fade.t / 10;
    ctx.fillStyle = `rgba(0,0,0,${clamp(a, 0, 1)})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let y = 0; y < cv.height; y += 4) ctx.fillRect(0, y, cv.width, 1);
  if (counters['true-clears'] !== null) {
    text(`裏ボス討伐 ${counters['true-clears']}人`, cv.width - 14, cv.height - 70, 15, 'rgba(255,120,160,0.6)', 'right');
  }
  if (counters.clears !== null) {
    text(`クリア者数 ${counters.clears}人`, cv.width - 14, cv.height - 48, 15, 'rgba(255,232,120,0.55)', 'right');
  }
  text('version ' + VERSION, cv.width - 14, cv.height - 26, 15, 'rgba(255,255,255,0.45)', 'right');
}

/* ================= メインループ ================= */
curTrack = 'title';
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

if (typeof globalThis.__TEST_HOOK === 'function') {
  globalThis.__TEST_HOOK({
    MAPS, ART, ENEMIES, hero, party, JOBS, makeCompanion, player, save, loadSave, continueGame, ngPlus,
    getState: () => state,
    getBattle: () => battle,
    press: c => { justPressed.add(c); },
    startBattle, teleport, newGame,
    setState: s => { state = s; },
    update, draw,
  });
}
</script>
